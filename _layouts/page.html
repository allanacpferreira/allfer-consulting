---
layout: default
---
<div class="section">
  <div class="container--narrow">
    <div class="section__header">
      {% if page.label %}
      <div class="section__label">{{ page.label }}</div>
      {% endif %}
      <h1 class="section__title">{{ page.title }}</h1>
      {% if page.subtitle %}
      <p class="section__subtitle">{{ page.subtitle }}</p>
      {% endif %}
    </div>
    <div class="prose">
      {{ content }}
    </div>
  </div>
</div>
