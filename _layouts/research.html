---
layout: default
---
<div class="section">
  <div class="container--narrow">
    <div class="mt-md">
      <a href="/research/" class="text-muted" style="font-size:0.85rem;">← All Research</a>
    </div>
    <div class="section__header mt-lg">
      <div class="section__label">Market Research</div>
      <h1 class="section__title">{{ page.title }}</h1>
      <div style="display:flex; gap:12px; align-items:center; margin-top:12px; flex-wrap:wrap;">
        <span class="text-muted" style="font-size:0.85rem;">{{ page.date | date: "%B %d, %Y" }}</span>
        {% if page.topic %}<span class="pill pill--blue">{{ page.topic }}</span>{% endif %}
      </div>
    </div>
    {% if page.summary %}
    <div class="card mt-md">
      <div class="card__label">Summary</div>
      <p class="card__body">{{ page.summary }}</p>
    </div>
    {% endif %}
    <div class="prose mt-lg">
      {{ content }}
    </div>
  </div>
</div>
