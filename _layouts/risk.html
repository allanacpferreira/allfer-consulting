---
layout: default
---
<div class="section">
  <div class="container--narrow">
    <div class="mt-md">
      <a href="/risks/" class="text-muted" style="font-size:0.85rem;">← Risk Register</a>
    </div>
    <div class="section__header mt-lg">
      <div class="section__label">Risk Record</div>
      <h1 class="section__title">{{ page.title }}</h1>
      <div style="display:flex; gap:12px; align-items:center; margin-top:12px; flex-wrap:wrap;">
        <span class="pill pill--{{ page.severity_color | default: 'amber' }}">{{ page.severity }}</span>
        <span class="pill pill--{{ page.status_color | default: 'muted' }}">{{ page.status }}</span>
        <span class="text-muted" style="font-size:0.85rem;">{{ page.date | date: "%B %d, %Y" }}</span>
      </div>
    </div>
    <div class="prose mt-lg">
      {{ content }}
    </div>
  </div>
</div>
